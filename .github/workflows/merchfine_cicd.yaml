name: MerchFine LLMOps CI/CD

on:
  push:
    branches:
      - main
  schedule:
    # Retrain every Sunday at 2 AM
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  MLFLOW_TRACKING_URI: http://localhost:5000
  OLLAMA_HOST: http://localhost:11434

jobs:
  test_and_lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Lint with Ruff
        run: ruff check .
      - name: Run Tests
        run: pytest tests/

  train_and_evaluate:
    needs: test_and_lint
    runs-on: [self-hosted, gpu, rtx-4070]
    steps:
      - uses: actions/checkout@v4
      - name: Run Orchestrator Pipeline
        run: |
          python -c "import asyncio; from orchestrator.pipeline import PipelineOrchestrator; asyncio.run(PipelineOrchestrator().run_full_pipeline())"
